name: Pruebas de Carga y Rendimiento

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      scenario:
        description: 'Escenario de prueba a ejecutar'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - stress
          - spike
          - soak
          - regression
          - all

jobs:
  perf-tests:
    name: Pruebas de Rendimiento – ${{ github.event.inputs.scenario || 'baseline' }}
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout del repositorio
        uses: actions/checkout@v4

      - name: 🟢 Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - name: 📦 Instalar dependencias
        run: npm install

      - name: ✅ Ejecutar pruebas unitarias previas (regresión de funcionalidad)
        run: npm test

      - name: 🚀 Iniciar servidor de la API en background
        run: |
          node src/server/app.js &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          sleep 3

      - name: 🏥 Verificar que el servidor está activo
        run: |
          curl --retry 5 --retry-delay 1 --retry-connrefused \
               -f http://127.0.0.1:3000/health \
               && echo "✅ Servidor listo"

      - name: 📊 Ejecutar pruebas de rendimiento
        run: |
          SCENARIO=${{ github.event.inputs.scenario || 'baseline' }}
          echo "Ejecutando escenario: $SCENARIO"
          node perf/scripts/run_perf_tests.js $SCENARIO
        env:
          BASE_URL: http://127.0.0.1:3000

      - name: 🛑 Detener servidor
        if: always()
        run: |
          if [ ! -z "$SERVER_PID" ]; then
            kill $SERVER_PID || true
          fi

      - name: 📁 Subir reportes como artefactos
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: performance-results-${{ github.event.inputs.scenario || 'baseline' }}-${{ github.run_number }}
          path: perf/results/
          retention-days: 30

      - name: 📝 Resumen en el Job
        if: always()
        run: |
          echo "## 📊 Resultados de Pruebas de Rendimiento" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Escenario:** ${{ github.event.inputs.scenario || 'baseline' }}" >> $GITHUB_STEP_SUMMARY
          echo "**Fecha:** $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Los reportes detallados están disponibles como artefactos del workflow." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### SLO Definidos" >> $GITHUB_STEP_SUMMARY
          echo "| SLO | Target |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Latencia p95 | < 300 ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Latencia p99 | < 500 ms |" >> $GITHUB_STEP_SUMMARY
          echo "| Tasa de errores | < 1% |" >> $GITHUB_STEP_SUMMARY
          echo "| Disponibilidad | ≥ 99% |" >> $GITHUB_STEP_SUMMARY

  # Job separado para regresión de rendimiento en cada PR
  perf-regression-check:
    name: Verificación SLO en PR
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm'

      - run: npm install

      - name: 🚀 Iniciar servidor
        run: |
          node src/server/app.js &
          sleep 3

      - name: 🔁 Regression Test (validación de SLO post-cambio)
        run: node perf/scripts/run_perf_tests.js regression
        env:
          BASE_URL: http://127.0.0.1:3000
